[pytest]
# 测试组织：
#   单元与集成测试（默认，不含 e2e）：
#     pytest -m "not e2e"
#   e2e 集成测试（需要真实后端运行在 localhost:8000）：
#     pytest -m e2e
#   全部测试（包含 e2e）：
#     pytest
# 注意：pytest.ini 不再通过 addopts 默认排除 e2e，确保完整回归不遗漏。

markers =
    e2e: end-to-end integration tests
    unit: unit tests
    live_model: live model sandbox drill, only runs when explicitly enabled

testpaths = backend/tests
